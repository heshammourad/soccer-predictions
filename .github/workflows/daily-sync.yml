name: Daily Soccer Predictor Sync

on:
  schedule:
    # Run once a day at 06:00 UTC (sweet spot for global game gaps and ratings updates)
    - cron: '0 6 * * *'
  # Allow manual trigger from the GitHub Actions tab
  workflow_dispatch:

jobs:
  sync-and-simulate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run Scraper & Simulation Engine
        run: pnpm exec tsx scripts/sync.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
